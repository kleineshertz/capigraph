# https://golangci-lint.run/usage/configuration/#config-file
# ~/go/bin/golangci-lint run ./...
# gofmt -s -w ./

version: "2"
formatters:
  enable:
    - goimports

linters:
  default: none
  enable:
    - errcheck
    - staticcheck
    - revive
    - govet
    - forbidigo
  settings:  
    revive:
      severity: error
      confidence: 0.8
      enable-all-rules: true
      rules:
        # Disabled rules
        - name: confusing-results
          disabled: true
        - name: add-constant
          disabled: true
        - name: argument-limit
          disabled: true
        - name: empty-lines
          disabled: true
        - name: exported
          disabled: true
        - name: function-length
          disabled: true
        - name: line-length-limit
          disabled: true
        - name: max-public-structs
          disabled: true
        - name: unused-receiver
          disabled: true
        - name: var-naming
          disabled: true
        - name: flag-parameter
          disabled: true

        # Rule tuning
        - name: max-control-nesting
          arguments:
            - 8
        - name: cognitive-complexity
          arguments:
            - 50
        - name: cyclomatic
          arguments:
            - 30
        - name: function-result-limit
          arguments:
            - 6
        - name: unhandled-error
          arguments:
            - "fmt.*"
            - "bytes.Buffer.*"
            - "strings.Builder.*"
            - "os.File.Close"
            - "io.Closer.Close"
            - "zap.Logger.Sync"
            - "net.Conn.Close"

  exclusions:
    warn-unused: true
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - path: svg_test\.go
        text: use of `fmt.Print(|f|ln)` forbidden by pattern
        linters: [ forbidigo]

        
